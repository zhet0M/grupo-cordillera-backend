spring.application.name=ventas
server.port=8082

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bd_ventas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Resilience4j
resilience4j.circuitbreaker.instances.finanzas.sliding-window-size=10
resilience4j.circuitbreaker.instances.finanzas.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.finanzas.wait-duration-in-open-state=5s

# Reintento de sincronizacion con finanzas
finanzas.reintento.delay-ms=60000
