server.port=8080
spring.application.name=api-gateway

# Autenticación
spring.cloud.gateway.server.webmvc.routes[0].id=authentication
spring.cloud.gateway.server.webmvc.routes[0].uri=${AUTH_SERVICE_URL:http://authentication:8081}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# Ventas
spring.cloud.gateway.server.webmvc.routes[1].id=ventas
spring.cloud.gateway.server.webmvc.routes[1].uri=${VENTAS_SERVICE_URL:http://ventas:8082}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/ventas/**

# Inventario
spring.cloud.gateway.server.webmvc.routes[2].id=inventario
spring.cloud.gateway.server.webmvc.routes[2].uri=${INVENTARIO_SERVICE_URL:http://inventario:8083}
