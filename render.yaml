# render.yaml: Blueprint para Render (usa tus Dockerfiles individuales)
# Ubicación: raíz del repositorio (y el repositorio solo contiene el backend, sin la carpeta grupo-cordillera-backend/)

services:
  # 1. API Gateway (punto de entrada principal)
  - type: web
    name: gc-api-gateway
    env: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      # Variables para conectar a los microservicios (usando URLs internas de Render)
      - key: AUTH_SERVICE_URL
        value: "http://gc-authentication:10000"
      - key: VENTAS_SERVICE_URL
        value: "http://gc-ventas:10000"
      - key: INVENTARIO_SERVICE_URL
        value: "http://gc-inventario:10000"
      - key: FINANZAS_SERVICE_URL
        value: "http://gc-finanzas:10000"
      - key: CLIENTES_SERVICE_URL
        value: "http://gc-clientes:10000"
      - key: KPIS_SERVICE_URL
        value: "http://gc-kpis:10000"
      - key: ALERTAS_SERVICE_URL
        value: "http://gc-alertas:10000"
      - key: REPORTES_SERVICE_URL
        value: "http://gc-reportes:10000"
      # JWT Secret (mismo que tus microservicios)
      - key: JWT_SECRET
        value: clave-secreta-grupo-cordillera-2025-muy-larga

  # 2. Authentication Microservice
  - type: web
    name: gc-authentication
    env: docker
    dockerfilePath: ./authentication/Dockerfile
    dockerContext: ./authentication
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: gc-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gc-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gc-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gc-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gc-db
          property: password
      - key: JWT_SECRET
        value: clave-secreta-grupo-cordillera-2025-muy-larga

  # 3. Ventas Microservice
  - type: web
    name: gc-ventas
    env: docker
    dockerfilePath: ./ventas/Dockerfile
    dockerContext: ./ventas
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: gc-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gc-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gc-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gc-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gc-db
          property: password
      - key: INVENTARIO_URL
        value: "http://gc-inventario:10000/inventario"
      - key: FINANZAS_URL
        value: "http://gc-finanzas:10000/finanzas"
      - key: CLIENTES_URL
        value: "http://gc-clientes:10000/clientes"

  # 4. Inventario Microservice
  - type: web
    name: gc-inventario
    env: docker
    dockerfilePath: ./inventario/Dockerfile
    dockerContext: ./inventario
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: gc-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gc-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gc-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gc-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gc-db
          property: password

  # 5. Finanzas Microservice
  - type: web
    name: gc-finanzas
    env: docker
    dockerfilePath: ./finanzas/Dockerfile
    dockerContext: ./finanzas
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: gc-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gc-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gc-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gc-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gc-db
          property: password
      - key: INVENTARIO_URL
        value: "http://gc-inventario:10000/inventario"

  # 6. Clientes Microservice
  - type: web
    name: gc-clientes
    env: docker
    dockerfilePath: ./clientes/Dockerfile
    dockerContext: ./clientes
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: gc-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gc-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gc-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gc-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gc-db
          property: password

  # 7. KPIs Microservice
  - type: web
    name: gc-kpis
    env: docker
    dockerfilePath: ./kpis/Dockerfile
    dockerContext: ./kpis
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: VENTAS_URL
        value: "http://gc-ventas:10000/ventas"
      - key: INVENTARIO_URL
        value: "http://gc-inventario:10000/inventario"
      - key: FINANZAS_URL
        value: "http://gc-finanzas:10000/finanzas"
      - key: CLIENTES_URL
        value: "http://gc-clientes:10000/clientes"

  # 8. Alertas Microservice
  - type: web
    name: gc-alertas
    env: docker
    dockerfilePath: ./alertas/Dockerfile
    dockerContext: ./alertas
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: gc-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gc-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gc-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gc-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gc-db
          property: password
      - key: VENTAS_URL
        value: "http://gc-ventas:10000/ventas"
      - key: INVENTARIO_URL
        value: "http://gc-inventario:10000/inventario"
      - key: FINANZAS_URL
        value: "http://gc-finanzas:10000/finanzas"

  # 9. Reportes Microservice
  - type: web
    name: gc-reportes
    env: docker
    dockerfilePath: ./reportes/Dockerfile
    dockerContext: ./reportes
    region: virginia
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: VENTAS_URL
        value: "http://gc-ventas:10000/ventas"
      - key: INVENTARIO_URL
        value: "http://gc-inventario:10000/inventario"
      - key: FINANZAS_URL
        value: "http://gc-finanzas:10000/finanzas"

  # 10. Metabase
  - type: web
    name: gc-metabase
    env: docker
    image:
      url: metabase/metabase:latest
    region: virginia
    plan: free
    envVars:
      - key: MB_DB_TYPE
        value: postgres
      - key: MB_DB_DBNAME
        fromDatabase:
          name: gc-metabase-db
          property: database
      - key: MB_DB_PORT
        fromDatabase:
          name: gc-metabase-db
          property: port
      - key: MB_DB_USER
        fromDatabase:
          name: gc-metabase-db
          property: user
      - key: MB_DB_PASS
        fromDatabase:
          name: gc-metabase-db
          property: password
      - key: MB_DB_HOST
        fromDatabase:
          name: gc-metabase-db
          property: host

# 11. Base de Datos Principal (gratuita en Render)
databases:
  - name: gc-db
    databaseName: grupocordillera
    user: grupocordillera
    region: virginia
    plan: free
    ipAllowList: []  # Permite acceso solo desde Render (seguro)
  
  # 12. Base de Datos para Metabase
  - name: gc-metabase-db
    databaseName: metabase
    user: metabase
    region: virginia
    plan: free
    ipAllowList: []  # Permite acceso solo desde Render (seguro)
