spring.application.name=alertas
server.port=8087

app.services.inventario-url=${INVENTARIO_URL:http://localhost:8083/inventario}
app.services.ventas-url=${VENTAS_URL:http://localhost:8082/ventas}
app.services.finanzas-url=${FINANZAS_URL:http://localhost:8084/finanzas}

alertas.deteccion.delay-ms=${ALERTAS_DETECCION_DELAY_MS:15000}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bd_alertas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.baseline-on-migrate=true
